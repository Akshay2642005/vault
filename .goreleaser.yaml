# .goreleaser.yaml
# GoReleaser configuration for Vault CLI

project_name: vault

builds:
  - id: vault
    main: ./cmd/vault/main.go
    binary: vault
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - id: vault-archive
    builds:
      - vault
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - AGENTS.md
      - DOCUMENTATION.md
      - docker-compose.yml

checksum:
  name_template: "checksums.txt"

changelog:
  sort: desc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: Akshay2642005
    name: vault

brews:
  - name: vault
    tap:
      owner: Akshay2642005
      name: homebrew-tap
    homepage: "https://github.com/Akshay2642005/vault"
    description: "A secure, multi-environment secret management CLI with encryption at rest."
    test: |
      vault --version

snapshot:
  name_template: "{{ .ProjectName }}-dev-{{ .ShortCommit }}"

signs:
  - cmd: gpg
    args: ["--detach-sign"]

env_files:
  - .env
